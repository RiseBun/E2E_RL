# ---- HUF 配置 ----
huf:
  enabled: true
  mode: hard  # hard / soft
  # 硬物理底线
  max_residual_norm: 5.0
  max_step_disp: 2.0
  # 优势门控
  delta_safe_margin: 0.0
  lambda_collision: 2.0
  lambda_offroad: 1.0
  lambda_comfort: 0.5
  lambda_drift: 1.0
  # 模型审查阈值
  tau_gain: 0.0
  tau_risk: 0.5
  # 规则权重 (仅 soft 模式)
  tau_uncertainty: 0.5
  tau_support: 0.5
  tau_drift: 0.5
  soft_temperature: 0.1
  w_uncertainty_final: 0.4
  w_support_final: 0.4
  w_drift_final: 0.2
  # 最小保留率
  min_retention_ratio: 0.1
  # STAPO（规划域）：正安全优势下，执行模态概率过低且模态分布过尖 → 静音
  stapo_enabled: true
  stapo_tau_pi: 0.35
  stapo_tau_entropy: 0.40
  stapo_softmax_temp: 1.0

# ---- ReliabilityNet 配置 ----
reliability_net:
  enabled: true
  scene_dim: 256
  plan_len: 6  # 实际数据 plan_len
  safety_feat_dim: 0
  hidden_dim: 128
  dropout: 0.1
  lr: 0.0001
  weight_decay: 0.0001
  model_path: "./experiments/scorer_training/best_model.pth"

# ---- 模型配置 ----
model:
  scene_dim: 256          # BEV 池化后的场景维度 (VAD embed_dims=256)
  plan_len: 12            # 轨迹展平维度 = fut_ts * 2 = 6 * 2
  hidden_dim: 128         # refiner 隐层维度 (调试用小值)
  dropout: 0.1
  output_norm: false      # 是否对 residual 施加 tanh 约束

# ---- Adapter 配置 ----
adapter:
  type: vad               # 使用 VADPlanningAdapter
  scene_pool: mean
  ego_fut_mode: 3
  fut_ts: 6

# ---- 训练配置 ----
training:
  # Stage 1: 监督预热
  supervised:
    epochs: 3
    lr: 1.0e-3
    weight_decay: 1.0e-4
    residual_reg_weight: 0.01
    grad_clip: 1.0

  # Stage 2: 奖励加权精炼
  reward_weighted:
    epochs: 2
    lr: 5.0e-4
    weight_decay: 1.0e-4
    residual_reg_weight: 0.01
    grad_clip: 1.0

  # 奖励权重
  reward:
    w_progress: 1.0
    w_collision: 0.5
    w_offroad: 0.3
    w_comfort: 0.1
    dt: 0.5

  # 学习率调度
  scheduler:
    type: cosine           # cosine / step
    T_max: 30              # 总 epoch 数 (supervised + reward)
    eta_min: 1.0e-6

# ---- Hard Case Mining ----
hard_case:
  error_weight: 1.0
  uncertainty_weight: 0.5
  collision_weight: 0.5
  top_ratio: 0.2

# ---- Harmful Update Filtering (HUF) ----
huf:
  enabled: true
  mode: hard  # hard / soft
  # Uncertainty 参数
  tau_uncertainty: 0.7
  w_confidence: 0.5
  w_mode_variance: 0.3
  w_residual_var: 0.2
  # Support 参数
  tau_support: 0.3
  support_alpha: 1.0
  max_residual_norm: 5.0
  # Drift 参数
  tau_drift: 0.8
  w_comfort: 0.4
  w_curvature: 0.3
  w_residual_mag: 0.3
  # 安全增强门控
  delta_safe_margin: 0.005
  lambda_collision: 2.0
  lambda_offroad: 1.0
  lambda_comfort: 0.5
  lambda_drift: 1.0
  # 硬物理底线
  max_step_disp: 2.0
  collision_guard: 0.1
  # Soft 模式参数
  soft_temperature: 1.0
  # 安全下限
  min_retention_ratio: 0.3
  # 综合评分权重
  w_uncertainty_final: 0.4
  w_support_final: 0.3
  w_drift_final: 0.3

# ---- ReliabilityNet (Learned Scorer) ----
reliability_net:
  enabled: false  # 第一阶段关闭，使用规则 HUF
  scene_dim: 256
  plan_len: 12
  safety_feat_dim: 0
  hidden_dim: 128
  dropout: 0.1
  lr: 1.0e-4
  weight_decay: 1.0e-4

# ---- 数据配置 ----
data:
  data_dir: /mnt/cpfs/prediction/lipeinan/RL/E2E_RL/data/vad_dumps
  batch_size: 4
  num_workers: 0

# ---- 日志 / 保存 ----
output_dir: /mnt/cpfs/prediction/lipeinan/RL/E2E_RL/experiments/refiner_debug
save_every: 5             # 每 N 个 epoch 保存一次 checkpoint
log_interval: 10          # 每 N 个 batch 打印一次日志
