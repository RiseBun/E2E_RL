# =============================================================================
# Refiner Only 实验配置 - 纯 Refiner，无任何筛选
# 
# 对比基准：测试不加任何筛选层时 Refiner 的表现
# =============================================================================

# ---- 模型配置 ----
model:
  scene_dim: 256
  plan_len: 12
  hidden_dim: 128
  dropout: 0.1
  output_norm: false

# ---- Scorer (ReliabilityNet) 配置 ----
reliability_net:
  enabled: false                    # ❌ 禁用 Scorer

# ---- HUF (规则筛选) 配置 ----
huf:
  enabled: false                    # ❌ 禁用 HUF

# ---- Hard Case Mining 配置 ----
hard_case:
  enabled: false                    # 简化训练

# ---- 数据配置 ----
data:
  data_dir: /mnt/cpfs/prediction/lipeinan/RL/E2E_RL/data/vad_dumps
  batch_size: 4
  num_workers: 0

# ---- 训练配置 ----
training:
  # Stage 1: 监督预热
  supervised:
    epochs: 5
    lr: 0.001
    weight_decay: 0.0001
    grad_clip: 1.0
    residual_reg_weight: 0.01
  
  # Stage 2: 奖励加权精炼
  reward_weighted:
    epochs: 3
    lr: 0.0005
    weight_decay: 0.0001
    grad_clip: 1.0
    residual_reg_weight: 0.01
  
  # 学习率调度器
  scheduler:
    type: cosine
    T_max: 30
    eta_min: 1.0e-06
  
  # 奖励配置
  reward:
    dt: 0.5
    w_progress: 1.0
    w_collision: 0.5
    w_offroad: 0.3
    w_comfort: 0.1

# ---- 日志 / 保存 ----
output_dir: /mnt/cpfs/prediction/lipeinan/RL/E2E_RL/experiments/refiner_only
save_every: 5
log_interval: 10
